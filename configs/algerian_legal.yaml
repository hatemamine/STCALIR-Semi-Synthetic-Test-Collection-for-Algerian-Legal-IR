language: arabic
dataset: algerian_legal
mode: domain
corpus_path: data/algerian_legal_corpus.jsonl
output_dir: outputs/
cache_dir: .cache/
stage1_source: computed
chunk_max_tokens: 512
chunk_stride: 50
chunk_min_tokens: 20
n_topics: 100
topic_mode: human
